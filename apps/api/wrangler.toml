name = "project-v3-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Ücretsiz Workers varsayılanı ~50 alt istek; aşımını önlemek için (bkz. developers.cloudflare.com/workers/wrangler/configuration/#limits)
[limits]
subrequests = 120

[[d1_databases]]
binding = "DB"
database_name = "esync-db"
database_id = "084b0070-ef9c-40f2-a34e-2a78356adb94"
migrations_dir = "migrations"

# Cron: Döviz kurları - sabah 10 ve akşam 16 (Türkiye saati, UTC+3)
# 10:00 TR = 07:00 UTC, 16:00 TR = 13:00 UTC
[triggers]
crons = ["0 7 * * *", "0 13 * * *"]

# R2 Storage - döküman, resim, video
# Önce bucket oluşturun: npx wrangler r2 bucket create esyncplus-storage
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "esyncplus-storage"